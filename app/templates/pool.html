<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pool Query - Northwind</title>
    <style>
        :root {
            --bg: #f4f7f4;
            --panel: #ffffff;
            --ink: #15322a;
            --muted: #4f6a61;
            --ok-bg: #d7f5df;
            --ok-border: #1f8f4a;
            --bad-bg: #ffe2e0;
            --bad-border: #c9392b;
            --accent: #0b6e9e;
            --accent-2: #0a4f73;
            --code: #0f172a;
            --line: #d7e3dd;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Segoe UI", "Helvetica Neue", sans-serif;
            background: linear-gradient(130deg, #eff6ef 0%, #f7f2ec 48%, #eef8fb 100%);
            color: var(--ink);
        }

        .wrap {
            max-width: 1180px;
            margin: 24px auto 40px;
            padding: 0 16px;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 14px;
        }

        h1 {
            margin: 0;
            font-size: clamp(1.4rem, 3vw, 2rem);
            letter-spacing: 0.2px;
        }

        .sub {
            margin: 6px 0 20px;
            color: var(--muted);
            font-size: 0.95rem;
        }

        .btn {
            border: 0;
            border-radius: 10px;
            padding: 10px 14px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-primary {
            background: var(--accent);
            color: #fff;
        }

        .btn-primary:hover {
            background: var(--accent-2);
        }

        .btn-ghost {
            background: #edf5f0;
            color: var(--ink);
            border: 1px solid #c8d8cf;
        }

        .panel {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 14px;
            box-shadow: 0 10px 28px rgba(20, 42, 33, 0.08);
            overflow: hidden;
        }

        .table-wrap {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 920px;
        }

        thead th {
            text-align: left;
            font-size: 0.82rem;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: #486258;
            background: #f2f7f4;
            border-bottom: 1px solid var(--line);
            padding: 12px 10px;
        }

        tbody td {
            border-bottom: 1px solid #ecf2ee;
            padding: 10px;
            vertical-align: top;
            font-size: 0.92rem;
        }

        tr.ok {
            background: var(--ok-bg);
            border-left: 4px solid var(--ok-border);
        }

        tr.bad {
            background: var(--bad-bg);
            border-left: 4px solid var(--bad-border);
        }

        .pill {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 700;
        }

        .pill.ok {
            background: #1f8f4a;
            color: #fff;
        }

        .pill.bad {
            background: #c9392b;
            color: #fff;
        }

        .sql {
            max-width: 430px;
            white-space: pre-wrap;
            word-break: break-word;
            color: var(--code);
            font-family: Consolas, "Courier New", monospace;
            font-size: 0.8rem;
            line-height: 1.35;
            margin: 0;
        }

        .actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .btn-run {
            background: #0a7e49;
            color: #fff;
            border: 0;
            border-radius: 8px;
            padding: 7px 10px;
            font-size: 0.83rem;
            cursor: pointer;
            font-weight: 700;
        }

        .btn-run:hover {
            background: #07653b;
        }

        .btn-copy {
            background: #0c5f86;
            color: #fff;
            border: 0;
            border-radius: 8px;
            padding: 7px 10px;
            font-size: 0.83rem;
            cursor: pointer;
            font-weight: 700;
        }

        .btn-copy:hover {
            background: #094b69;
        }

        .result {
            margin-top: 16px;
            background: #fff;
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 14px;
        }

        .result h2 {
            margin: 0 0 10px;
            font-size: 1.05rem;
        }

        .muted {
            color: var(--muted);
            font-size: 0.9rem;
        }

        .error {
            color: #ab2f24;
            font-weight: 600;
        }

        .result-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 8px;
            min-width: 540px;
        }

        .result-table th,
        .result-table td {
            border: 1px solid #e6eeea;
            padding: 8px;
            font-size: 0.88rem;
        }

        .empty {
            padding: 26px;
            text-align: center;
            color: var(--muted);
        }

        @media (max-width: 780px) {
            .topbar {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="topbar">
            <h1>Pool Query Explorer</h1>
            <div class="actions">
                <a href="/" class="btn btn-ghost" style="text-decoration:none;">Vai a Text-to-SQL</a>
                <button class="btn btn-primary" onclick="loadPool()">Aggiorna elenco</button>
            </div>
        </div>
        <p class="sub">Le query corrette sono evidenziate in verde, quelle sbagliate in rosso. Da qui puoi copiarle o rieseguirle.</p>

        <div class="panel table-wrap">
            <table id="pool-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Stato</th>
                        <th>Domanda</th>
                        <th>SQL</th>
                        <th>Errore</th>
                        <th>Azioni</th>
                    </tr>
                </thead>
                <tbody id="pool-body">
                    <tr><td colspan="6" class="empty">Caricamento pool in corso...</td></tr>
                </tbody>
            </table>
        </div>

        <div class="result" id="execution-result">
            <h2>Risultato esecuzione</h2>
            <div id="execution-info" class="muted">Seleziona una query dal pool e premi Esegui.</div>
            <div class="table-wrap">
                <table class="result-table" id="result-table"></table>
            </div>
        </div>
    </div>

    <script>
        function escapeHtml(value) {
            return String(value ?? "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/\"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function renderRows(items) {
            const tbody = document.getElementById("pool-body");
            if (!items.length) {
                tbody.innerHTML = "<tr><td colspan='6' class='empty'>Nessuna query nel pool.</td></tr>";
                return;
            }

            tbody.innerHTML = items.map((item) => {
                const isCorrect = Boolean(item.is_correct);
                const rowClass = isCorrect ? "ok" : "bad";
                const pillClass = isCorrect ? "ok" : "bad";
                const pillText = isCorrect ? "CORRETTA" : "SBAGLIATA";
                const errorText = item.error ? escapeHtml(item.error) : "-";
                const sqlText = escapeHtml(item.query || "");
                const questionText = escapeHtml(item.question || "");

                return `
                    <tr class="${rowClass}">
                        <td>${item.id}</td>
                        <td><span class="pill ${pillClass}">${pillText}</span></td>
                        <td>${questionText}</td>
                        <td><pre class="sql">${sqlText}</pre></td>
                        <td>${errorText}</td>
                        <td>
                            <div class="actions">
                                <button class="btn-run" onclick="runSql(${item.id})">Esegui</button>
                                <button class="btn-copy" onclick="copySql(${item.id})">Copia SQL</button>
                            </div>
                        </td>
                    </tr>
                `;
            }).join("");
        }

        let poolItems = [];

        async function loadPool() {
            const tbody = document.getElementById("pool-body");
            tbody.innerHTML = "<tr><td colspan='6' class='empty'>Caricamento pool in corso...</td></tr>";
            try {
                const response = await fetch("/api/pool");
                const data = await response.json();
                if (!data.success) {
                    throw new Error(data.detail || "Errore caricamento pool");
                }
                poolItems = data.items || [];
                renderRows(poolItems);
            } catch (err) {
                tbody.innerHTML = `<tr><td colspan='6' class='empty error'>${escapeHtml(err.message)}</td></tr>`;
            }
        }

        async function runSql(id) {
            const item = poolItems.find((x) => x.id === id);
            if (!item) {
                return;
            }

            const info = document.getElementById("execution-info");
            const table = document.getElementById("result-table");
            info.textContent = "Esecuzione in corso...";
            info.className = "muted";
            table.innerHTML = "";

            try {
                const response = await fetch("/api/pool/execute", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ sql: item.query })
                });

                const res = await response.json();
                if (!response.ok || !res.success) {
                    throw new Error(res.detail || res.error || "Errore durante esecuzione query");
                }

                info.textContent = `Query eseguita con successo. Righe restituite: ${res.row_count}`;
                info.className = "muted";

                const columns = res.columns || [];
                const rows = res.data || [];

                if (!columns.length) {
                    table.innerHTML = "<tr><td>Nessuna colonna restituita.</td></tr>";
                    return;
                }

                const header = `<thead><tr>${columns.map((c) => `<th>${escapeHtml(c)}</th>`).join("")}</tr></thead>`;
                const body = `<tbody>${rows.map((row) => `<tr>${row.map((cell) => `<td>${escapeHtml(cell)}</td>`).join("")}</tr>`).join("")}</tbody>`;
                table.innerHTML = header + body;
            } catch (err) {
                info.textContent = err.message;
                info.className = "error";
            }
        }

        async function copySql(id) {
            const item = poolItems.find((x) => x.id === id);
            if (!item) {
                return;
            }

            try {
                await navigator.clipboard.writeText(item.query || "");
                const info = document.getElementById("execution-info");
                info.textContent = "SQL copiata negli appunti.";
                info.className = "muted";
            } catch (_) {
                const info = document.getElementById("execution-info");
                info.textContent = "Impossibile copiare negli appunti da questo browser.";
                info.className = "error";
            }
        }

        loadPool();
    </script>
</body>
</html>
