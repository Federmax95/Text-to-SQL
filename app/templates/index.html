<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Northwind Text-to-SQL</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .loading { display: none; }
        #results-table { margin-top: 20px; }
    </style>
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="mb-0">📊 Northwind Text-to-SQL</h1>
            <a href="/pool" class="btn btn-outline-secondary">Apri Pool Query</a>
        </div>
        
        <div class="card p-4 shadow-sm">
            <div class="input-group mb-3">
                <input type="text" id="question" class="form-control" placeholder="Inserisci la tua domanda...">
                <button class="btn btn-primary" onclick="sendQuery()">Invia</button>
            </div>

            <div id="loader" class="text-center loading">
                <div class="spinner-border text-primary" role="status"></div>
                <p>Elaborazione in corso...</p>
            </div>

            <div id="response-area">
                <div id="sql-preview" class="alert alert-secondary d-none"></div>
                <div id="feedback-area" class="mb-3 d-none">
                    <p class="mb-2">Per migliorare l'affidabilità del modello bisogna aumentare i dati che ha a disposizione. Vuoi inserire questa query che ha generato nel pool?</p>
                    <div class="btn-group" role="group" aria-label="Feedback query">
                        <button id="btn-correct" class="btn btn-success">Sì</button>
                        <button id="btn-wrong" class="btn btn-danger">No</button>
                    </div>
                    <div id="feedback-message" class="mt-2"></div>
                </div>
                <div class="table-responsive">
                    <table id="results-table" class="table table-striped table-hover"></table>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentQuestion = "";
        let currentSql = "";

        async function sendQuery() {
            currentQuestion = document.getElementById('question').value;
            const loader = document.getElementById('loader');
            const table = document.getElementById('results-table');
            const sqlPrev = document.getElementById('sql-preview');
            const feedbackArea = document.getElementById('feedback-area');
            const feedbackMessage = document.getElementById('feedback-message');

            if (!currentQuestion) return alert("Inserisci una domanda!");

            // Reset e mostra loader
            table.innerHTML = "";
            sqlPrev.classList.add('d-none');
            feedbackArea.classList.add('d-none');
            feedbackMessage.textContent = "";
            loader.style.display = "block";

            try {
                const response = await fetch('/api/ask', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({question: currentQuestion})
                });
                const res = await response.json();

                if (res.success){
                    currentSql = res.sql;
                    sqlPrev.textContent = "SQL: " + res.sql;
                    sqlPrev.classList.remove('d-none');
                    feedbackArea.classList.remove('d-none');

                   if (!res.retrieved) {
                        feedbackArea.classList.remove('d-none');
                        document.getElementById('btn-correct').onclick = () => saveFeedback(true);
                        document.getElementById('btn-wrong').onclick = () => saveFeedback(false);
                    } else {
                        feedbackArea.classList.add('d-none');
                    }

                    if (res.data.length > 0) {
                        let header = "<thead><tr>" + res.columns.map(c => `<th>${c}</th>`).join('') + "</tr></thead>";
                        let body = "<tbody>" + res.data.map(row => 
                            "<tr>" + row.map(cell => `<td>${cell}</td>`).join('') + "</tr>"
                        ).join('') + "</tbody>";
                        table.innerHTML = header + body;
                    } else {
                        table.innerHTML = "<p class='text-muted'>Nessun risultato trovato.</p>";
                    }
                } else {
                    alert("Errore: " + res.error);
                }
            } catch (e) {
                alert("Errore di connessione al server.");
            } finally {
                loader.style.display = "none";
            }
        }

        async function saveFeedback(correct) {
            const feedbackMessage = document.getElementById('feedback-message');
            try {
                const response = await fetch('/api/save', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        question: currentQuestion,
                        sql: currentSql,
                        correct: correct
                    })
                });
                const res = await response.json();
                if (res.success) {
                    feedbackMessage.textContent = res.message || (correct ? 'Query salvata nel pool.' : 'Query non salvata nel pool.');
                    feedbackMessage.className = correct ? 'text-success' : 'text-danger';
                } else {
                    feedbackMessage.textContent = res.error || 'Errore durante il salvataggio del feedback.';
                    feedbackMessage.className = 'text-danger';
                }
            } catch (e) {
                feedbackMessage.textContent = 'Errore di connessione al server.';
                feedbackMessage.className = 'text-danger';
            }
        }
    </script>
</body>
</html>
